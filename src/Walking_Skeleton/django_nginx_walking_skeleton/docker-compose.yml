services:
  # Django backend service
  backend:
    build: ./backend
    # Port 8000 is only available inside the Docker network.
    # The backend is not directly exposed to the host machine.
    expose:
      - "8000"

  # nginx acts as reverse proxy in front of the Django backend
  reverse-proxy:
    image: nginx:latest
    # Host port 8080 is mapped to nginx port 80 inside the container.
    ports:
      - "8080:80"
    # Use our custom nginx configuration.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend