events {}

http {
    # Internal name for the Django backend service.
    # "backend" is the service name from docker-compose.yml.
    upstream django_backend {
        server backend:8000;
    }

    server {
        listen 80;

        # All API requests are forwarded to the Django backend.
        location /api/ {
            proxy_pass http://django_backend/api/;

            # Forward original request information to Django.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}